name: Bug report
description: Report a reproducible bug in @govex/futarchy-sdk
title: "Bug: "
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: SDK version
      description: Output of `npm ls @govex/futarchy-sdk` (or the version you're using).
      placeholder: 0.2.0
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Network
      options:
        - mainnet
        - testnet
        - devnet
        - localnet
        - other / not applicable
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps/code to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      render: shell
    validations:
      required: false

